appId: com.careco.users
---
- launchApp
- clearState

# 1. Start on Login screen
- assertVisible: "Welcome Back"
- assertVisible: "SAMVAYA"
- tapOn: "Sign Up"
- assertVisible: "Step 1: Profile Creation"

# 2. Fill Identity (Step 1)
- tapOn: "Enter your full name"
- inputText: "Maestro Tester"
- hideKeyboard
- tapOn: "Enter your email"
- inputText: "maestro@careco.in"
- hideKeyboard

# 2b. Verify Email via OTP (required before Continue)
- tapOn:
    text: "Verify"
    index: 0
# NOTE: OTP verification requires backend mock or test bypass.
# In CI, use Maestro's `runScript` to inject an OTP or mock the endpoint.
# For now, we assume the test environment auto-verifies.

- tapOn: "10-digit number"
- inputText: "9999999999"
- hideKeyboard

# 2c. Verify Phone via OTP
- tapOn:
    text: "Verify"
    index: 1

# 2d. Create password
- tapOn: "Create a password"
- inputText: "Secure123!"
- hideKeyboard
- tapOn: "Re-enter your password"
- inputText: "Secure123!"
- hideKeyboard
- tapOn: "Continue"

# 3. Fill Locality (Step 2)
- assertVisible: "What's your location?"
- tapOn: "Select city manually"
# Wait for city modal to load
- assertVisible: "Select Your City"
- tapOn: "Search cities..."
- inputText: "Bangalore"
- hideKeyboard
# Tap the first matching city result
- tapOn:
    text: "Bangalore"
    index: 0
# City selected, modal closes, continue button appears
- assertVisible: "Continue to Plans"
- tapOn: "Continue to Plans"

# 4. Plan Selection & Payment (Step 3)
- assertVisible: "Basic Plan"
- tapOn: "Selected — Pay ₹500"
# UPI Payment modal
- assertVisible: "Complete Payment"
- tapOn: "Google Pay"

# 5. Payment Success (Step 4)
- assertVisible: "Payment Successful!"
- tapOn: "Continue"

# 6. Final onboarding (Step 5)
- assertVisible: "Welcome to the Family!"
- tapOn: "Enter Dashboard"

# 7. Verify landed on Home Screen
- assertVisible: "TODAY'S MEDICATIONS"
- assertVisible: "MY VITALS"
