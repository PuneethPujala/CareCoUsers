<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareMyMed Widget Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 48px;
    padding: 40px;
    background: #f0f0f0;
    min-height: 100vh;
  }
  h3 { text-align: center; margin-bottom: 12px; color: #333; font-size: 14px; }

  .widget {
    width: 320px;
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
  }
  .widget.light {
    background: #FFFFFF;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  .widget.dark {
    background: #1E1E1E;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  /* Top bar */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .widget-title {
    font-size: 18px;
    font-weight: bold;
  }
  .light .widget-title { color: #000000; }
  .dark .widget-title { color: #F9FAFB; }

  .shield-icon {
    width: 24px; height: 24px;
  }
  .light .shield-icon { color: #6B4EFF; }
  .dark .shield-icon { color: #8C7DFF; }

  /* Content row */
  .content-row {
    display: flex;
    align-items: center;
    flex: 1;
  }

  /* Circular progress */
  .circle-wrap {
    width: 72px; height: 72px;
    position: relative;
    margin-right: 16px;
    flex-shrink: 0;
  }
  .circle-bg {
    fill: none;
    stroke-width: 6;
  }
  .light .circle-bg { stroke: #E8E2FF; }
  .dark .circle-bg { stroke: #3B3654; }

  .circle-progress {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
    transition: stroke-dashoffset 0.5s ease;
  }
  .light .circle-progress { stroke: #6B4EFF; }
  .dark .circle-progress { stroke: #8C7DFF; }

  .circle-text {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 20px;
    font-weight: bold;
  }
  .light .circle-text { color: #000000; }
  .dark .circle-text { color: #F9FAFB; }

  /* Details */
  .details { flex: 1; min-width: 0; }

  .progress-label {
    font-size: 14px;
    margin-bottom: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .light .progress-label { color: #757575; }
  .dark .progress-label { color: #9CA3AF; }

  .next-time {
    font-size: 13px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .light .next-time { color: #6B4EFF; }
  .dark .next-time { color: #8C7DFF; }

  .next-name {
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .light .next-name { color: #000000; }
  .dark .next-name { color: #F9FAFB; }

  .done-text {
    font-size: 14px;
    font-weight: bold;
  }
  .light .done-text { color: #6B4EFF; }
  .dark .done-text { color: #8C7DFF; }

  .empty-text {
    font-size: 14px;
  }
  .light .empty-text { color: #757575; }
  .dark .empty-text { color: #9CA3AF; }

  /* State tabs */
  .state-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    justify-content: center;
  }
  .state-tab {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #ccc;
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    color: #666;
    transition: all 0.2s;
  }
  .state-tab.active {
    background: #6B4EFF;
    color: white;
    border-color: #6B4EFF;
  }

  .section { margin-bottom: 20px; }
  .section-title { font-size: 12px; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>

<div>
  <div class="section">
    <div class="section-title">Light Mode</div>
    <div class="state-tabs" data-target="light">
      <button class="state-tab active" onclick="setState('light','next')">Next Dose</button>
      <button class="state-tab" onclick="setState('light','done')">All Done</button>
      <button class="state-tab" onclick="setState('light','empty')">Empty</button>
    </div>
    <div class="widget light" id="widget-light">
      <div class="top-bar">
        <span class="widget-title">CareMyMed</span>
        <svg class="shield-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 16l-4-4 1.41-1.41L11 14.17l6.59-6.59L19 9l-8 8z"/></svg>
      </div>
      <div class="content-row">
        <div class="circle-wrap">
          <svg viewBox="0 0 72 72" width="72" height="72">
            <circle class="circle-bg" cx="36" cy="36" r="30"/>
            <circle class="circle-progress" id="progress-light" cx="36" cy="36" r="30"
              stroke-dasharray="188.5" stroke-dashoffset="56.55"/>
          </svg>
          <span class="circle-text" id="pct-light">70%</span>
        </div>
        <div class="details">
          <div class="progress-label" id="label-light">5/7 taken today</div>
          <div id="state-next-light">
            <div class="next-time">Next at 9:00 PM</div>
            <div class="next-name">Amoxicillin 500mg</div>
          </div>
          <div id="state-done-light" style="display:none">
            <div class="done-text">All done today! 🎉</div>
          </div>
          <div id="state-empty-light" style="display:none">
            <div class="empty-text">No medicines scheduled.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="section" style="margin-top: 32px;">
    <div class="section-title">Dark Mode</div>
    <div class="state-tabs" data-target="dark">
      <button class="state-tab active" onclick="setState('dark','next')">Next Dose</button>
      <button class="state-tab" onclick="setState('dark','done')">All Done</button>
      <button class="state-tab" onclick="setState('dark','empty')">Empty</button>
    </div>
    <div class="widget dark" id="widget-dark">
      <div class="top-bar">
        <span class="widget-title">CareMyMed</span>
        <svg class="shield-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 16l-4-4 1.41-1.41L11 14.17l6.59-6.59L19 9l-8 8z"/></svg>
      </div>
      <div class="content-row">
        <div class="circle-wrap">
          <svg viewBox="0 0 72 72" width="72" height="72">
            <circle class="circle-bg" cx="36" cy="36" r="30"/>
            <circle class="circle-progress" id="progress-dark" cx="36" cy="36" r="30"
              stroke-dasharray="188.5" stroke-dashoffset="56.55"/>
          </svg>
          <span class="circle-text" id="pct-dark">70%</span>
        </div>
        <div class="details">
          <div class="progress-label" id="label-dark">5/7 taken today</div>
          <div id="state-next-dark">
            <div class="next-time">Next at 9:00 PM</div>
            <div class="next-name">Amoxicillin 500mg</div>
          </div>
          <div id="state-done-dark" style="display:none">
            <div class="done-text">All done today! 🎉</div>
          </div>
          <div id="state-empty-dark" style="display:none">
            <div class="empty-text">No medicines scheduled.</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function setState(theme, state) {
  ['next','done','empty'].forEach(s => {
    document.getElementById('state-'+s+'-'+theme).style.display = s === state ? 'block' : 'none';
  });
  // Update tabs
  const tabs = document.querySelector(`.state-tabs[data-target="${theme}"]`);
  tabs.querySelectorAll('.state-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  // Update progress for state
  const circumference = 188.5;
  let pct, label;
  if (state === 'next') { pct = 70; label = '5/7 taken today'; }
  else if (state === 'done') { pct = 100; label = '7/7 taken today'; }
  else { pct = 0; label = '0/0 taken today'; }

  const offset = circumference - (pct / 100) * circumference;
  document.getElementById('progress-'+theme).setAttribute('stroke-dashoffset', offset);
  document.getElementById('pct-'+theme).textContent = pct + '%';
  document.getElementById('label-'+theme).textContent = label;
}
</script>

</body>
</html>
